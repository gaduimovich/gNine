name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DGNINE_ENABLE_SDL_PREVIEW=OFF

      - name: Build
        run: cmake --build build --target gnine gnine_runtime_tests gnine_semantic_tests gnine_color_tests -j4

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -R '^gnine_'

      - name: Upload gnine binary
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gnine-linux-x64
          path: build/gnine
          if-no-files-found: error

  benchmarks:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download gnine binary (head)
        uses: actions/download-artifact@v8.0.1
        with:
          name: gnine-linux-x64
          path: gnine-head

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Make gnine binary executable
        run: chmod +x gnine-head/gnine

      - name: Run pull request benchmarks
        run: |
          python3 .github/scripts/benchmark_pr.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.event.pull_request.head.sha }}" \
            --head-binary "$GITHUB_WORKSPACE/gnine-head/gnine" \
            --output-json "$GITHUB_WORKSPACE/benchmark-results.json" \
            --output-markdown "$GITHUB_WORKSPACE/benchmark-comment.md" \
            --logs-dir "$GITHUB_WORKSPACE/benchmark-logs"

      - name: Publish benchmark summary
        run: cat "$GITHUB_WORKSPACE/benchmark-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: benchmark-results-pr-${{ github.event.pull_request.number }}
          path: |
            benchmark-results.json
            benchmark-comment.md
            benchmark-logs
          if-no-files-found: error

      - name: Comment benchmark results on PR
        if: github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(`${process.env.GITHUB_WORKSPACE}/benchmark-comment.md`, 'utf8');
            const marker = '<!-- gnine-benchmark-comment -->';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  gameplay-captures:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download gnine binary (head)
        uses: actions/download-artifact@v8.0.1
        with:
          name: gnine-linux-x64
          path: gnine-head

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Make gnine binary executable
        run: chmod +x gnine-head/gnine

      - name: Generate gameplay captures
        run: |
          inline_base_url="https://raw.githubusercontent.com/${{ github.repository }}/gnine-gameplay-pr-${{ github.event.pull_request.number }}/readme_images"
          python3 .github/scripts/playback_pr.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --binary "$GITHUB_WORKSPACE/gnine-head/gnine" \
            --output-dir "$GITHUB_WORKSPACE/gameplay-captures" \
            --output-json "$GITHUB_WORKSPACE/gameplay-captures/gameplay-captures.json" \
            --output-markdown "$GITHUB_WORKSPACE/gameplay-captures/gameplay-captures.md" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --inline-base-url "$inline_base_url"

      - name: Upload gameplay artifacts
        id: upload-gameplay-bundle
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gameplay-captures-pr-${{ github.event.pull_request.number }}
          path: gameplay-captures
          if-no-files-found: error

      - name: Upload snake gif
        id: upload-snake-gif
        uses: actions/upload-artifact@v7.0.1
        with:
          path: gameplay-captures/snake/snake.gif
          archive: false

      - name: Upload pong gif
        id: upload-pong-gif
        uses: actions/upload-artifact@v7.0.1
        with:
          path: gameplay-captures/pong/pong.gif
          archive: false

      - name: Upload flappy gif
        id: upload-flappy-gif
        uses: actions/upload-artifact@v7.0.1
        with:
          path: gameplay-captures/flappy/flappy.gif
          archive: false

      - name: Publish gameplay GIFs
        if: github.event.pull_request.head.repo.fork == false
        run: |
          set -euo pipefail
          asset_branch="gnine-gameplay-pr-${{ github.event.pull_request.number }}"
          publish_dir="${RUNNER_TEMP}/gnine-gameplay-assets"
          git worktree add --force -b "$asset_branch" "$publish_dir" origin/main
          mkdir -p "$publish_dir/readme_images"
          cp "$GITHUB_WORKSPACE/gameplay-captures/snake/snake.gif" "$publish_dir/readme_images/runtime_snake.gif"
          cp "$GITHUB_WORKSPACE/gameplay-captures/pong/pong.gif" "$publish_dir/readme_images/runtime_pong.gif"
          cp "$GITHUB_WORKSPACE/gameplay-captures/flappy/flappy.gif" "$publish_dir/readme_images/runtime_flappy.gif"
          git -C "$publish_dir" add readme_images/runtime_snake.gif readme_images/runtime_pong.gif readme_images/runtime_flappy.gif
          if ! git -C "$publish_dir" diff --cached --quiet; then
            git -C "$publish_dir" -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Update gameplay captures for PR #${{ github.event.pull_request.number }}"
          fi
          git -C "$publish_dir" push --force origin "HEAD:refs/heads/$asset_branch"
          git worktree remove --force "$publish_dir"

      - name: Publish gameplay summary
        run: |
          cat "$GITHUB_WORKSPACE/gameplay-captures/gameplay-captures.md" >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "## Direct artifact links"
            echo ""
            echo "- Snake GIF: [download](${{ steps.upload-snake-gif.outputs.artifact-url }})"
            echo "- Pong GIF: [download](${{ steps.upload-pong-gif.outputs.artifact-url }})"
            echo "- Flappy Bird GIF: [download](${{ steps.upload-flappy-gif.outputs.artifact-url }})"
            echo "- Full capture bundle: [download artifacts](${{ steps.upload-gameplay-bundle.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment gameplay captures on PR
        if: github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            let body = fs.readFileSync(`${process.env.GITHUB_WORKSPACE}/gameplay-captures/gameplay-captures.md`, 'utf8');
            const marker = '<!-- gnine-gameplay-comment -->';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
